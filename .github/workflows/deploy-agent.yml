# Despliega telvoice-sms-agent en el VPS (agent.telvoice.cl) al hacer push a main.
#
# Secretos requeridos (GitHub → Settings → Secrets and variables → Actions):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY
# Opcional:
#   VPS_APP_PATH (default: /var/www/telvoice-sms-agent)
#   VPS_SSH_PORT (default: 22)
#
# Ver docs/deploy-agent.md para configuración y diagnóstico.
#
# Build en VPS: rsync excluye dist/ (se preserva hasta rm -rf dist). Sin limpiar dist,
# archivos .js huérfanos o desactualizados pueden quedar (p. ej. agentCore.js viejo
# mientras agentPurchaseFlow.js es nuevo). Siempre: rm -rf dist && npm run build.

name: Deploy agent.telvoice.cl

on:
  push:
    branches: [main]
    # Rutas que afectan build/runtime. No incluir docs/** ni *.md sueltos:
    # un push solo-documentación no debe desplegar a producción.
    paths:
      - "telvoice-sms-agent/src/**"
      - "telvoice-sms-agent/scripts/**"
      - "telvoice-sms-agent/supabase/**"
      - "telvoice-sms-agent/package.json"
      - "telvoice-sms-agent/package-lock.json"
      - "telvoice-sms-agent/tsconfig.json"
      - "telvoice-sms-agent/public/**"
      - "css/telvoice-agent-widget-shared.css"
      - "css/telvoice-web-agent.css"
      - "telvoice-sms-agent/.env.example"
      - ".github/workflows/deploy-agent.yml"
  workflow_dispatch:

concurrency:
  group: deploy-agent-production
  cancel-in-progress: false

# Deploy por SSH nativo (openssh en ubuntu-latest). Evita depender de codeload.github.com
# para descargar appleboy/ssh-action (fallos transitorios en "Set up job").
# Si el job falla por infraestructura de GitHub: Re-run jobs o workflow_dispatch.

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Validar secretos requeridos
        env:
          HAS_HOST: ${{ secrets.VPS_HOST != '' }}
          HAS_USER: ${{ secrets.VPS_USER != '' }}
          HAS_KEY: ${{ secrets.VPS_SSH_KEY != '' }}
        run: |
          set -e
          missing=""
          [ "$HAS_HOST" = "true" ] || missing="${missing}VPS_HOST "
          [ "$HAS_KEY" = "true" ] || missing="${missing}VPS_SSH_KEY "
          if [ -n "$missing" ]; then
            echo "::error::Faltan secretos en GitHub Actions: ${missing}"
            echo "Configúralos en Settings → Secrets and variables → Actions."
            echo "Guía: docs/deploy-agent.md"
            exit 1
          fi
          echo "Secretos obligatorios presentes (valores no mostrados)."
          if [ "$HAS_USER" != "true" ]; then
            echo "ADVERTENCIA: VPS_USER no está definido; se intentará fallback a root."
          fi

      - name: Configurar SSH para deploy
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY no es una clave privada OpenSSH válida."
            exit 1
          fi
          echo "Huella clave deploy (pública derivada):"
          ssh-keygen -lf ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_SSH_PORT || 22 }}"
          if ! ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ADVERTENCIA: ssh-keyscan falló; se usará StrictHostKeyChecking=accept-new en el check."
            touch ~/.ssh/known_hosts
          fi

      - name: Comprobar conexión SSH y ruta
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
        run: |
          set -euo pipefail
          PORT="${{ secrets.VPS_SSH_PORT || 22 }}"
          APP_PATH="${VPS_APP_PATH:-/var/www/telvoice-sms-agent}"
          STRICT_OPTS="-o StrictHostKeyChecking=yes"
          if [ ! -s ~/.ssh/known_hosts ]; then
            STRICT_OPTS="-o StrictHostKeyChecking=accept-new"
          fi
          # Producción usa root; probar root primero y luego VPS_USER si difiere.
          CANDIDATES="root"
          if [ -n "${VPS_USER:-}" ] && [ "$VPS_USER" != "root" ]; then
            CANDIDATES="$CANDIDATES $VPS_USER"
          fi
          SSH_OK_USER=""
          for attempt in 1 2 3; do
            for candidate in $CANDIDATES; do
              echo "Probando SSH con usuario: ${candidate} (intento ${attempt}/3)"
              if ssh -i ~/.ssh/deploy_key -p "$PORT" -o BatchMode=yes $STRICT_OPTS \
                -o ConnectTimeout=20 \
                -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
                "${candidate}@${VPS_HOST}" env APP_PATH="$APP_PATH" bash -s <<'REMOTE'
          set -euo pipefail
          if [ -z "$APP_PATH" ]; then APP_PATH="/var/www/telvoice-sms-agent"; fi
          echo "=== SSH conectado ==="
          whoami
          hostname
          echo "APP_PATH=${APP_PATH}"
          test -d "$APP_PATH" || { echo "::error::Directorio no existe: ${APP_PATH}"; exit 1; }
          test -f "$APP_PATH/package.json" || { echo "::error::Falta package.json en ${APP_PATH}"; exit 1; }
          command -v node >/dev/null
          command -v npm >/dev/null
          node -v
          npm -v
          pm2 -v 2>/dev/null || echo "ADVERTENCIA: pm2 no encontrado en PATH"
          REMOTE
              then
                SSH_OK_USER="$candidate"
                echo "SSH_OK_USER=${candidate}" >> "$GITHUB_ENV"
                break 2
              fi
              echo "Falló usuario ${candidate} (auth, ruta o prerequisitos)."
            done
            [ -n "${SSH_OK_USER:-}" ] && break
            echo "SSH intento ${attempt}/3 falló; reintento en 15s..."
            sleep 15
          done
          if [ -z "$SSH_OK_USER" ]; then
            echo "::error::No se pudo autenticar por SSH. Revisa VPS_HOST, VPS_USER y VPS_SSH_KEY."
            echo "Huella esperada en servidor: SHA256:THmI/vVwUwpM3zN3Mc5IxYiaMH4PEmLs7Kyo6rq9TMQ (github-actions-telvoice-deploy)"
            exit 1
          fi

      - name: Desplegar aplicación
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PORT="${{ secrets.VPS_SSH_PORT || 22 }}"
          APP_PATH="${VPS_APP_PATH:-/var/www/telvoice-sms-agent}"
          SSH_USER="${SSH_OK_USER:-${VPS_USER:-root}}"
          echo "Usando usuario SSH: ${SSH_USER}"
          timeout 15m ssh -i ~/.ssh/deploy_key -p "$PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=60 \
            "${SSH_USER}@${VPS_HOST}" \
            env APP_PATH="$APP_PATH" DEPLOY_SHA="$DEPLOY_SHA" DEPLOY_REPO="$DEPLOY_REPO" bash -s <<'REMOTE'
          set -euo pipefail
          if [ -z "$APP_PATH" ]; then APP_PATH="/var/www/telvoice-sms-agent"; fi
          REPO="https://github.com/${DEPLOY_REPO}.git"
          CLONE_DIR="/tmp/telvoice-deploy-$$"
          ENV_BACKUP="/tmp/telvoice-agent-env.backup.$$"

          echo "=== Deploy Etapa agent.telvoice.cl ==="
          echo "Commit: ${DEPLOY_SHA}"
          echo "APP_PATH=${APP_PATH}"

          if [ -f "$APP_PATH/.env" ]; then
            cp "$APP_PATH/.env" "$ENV_BACKUP"
            echo ".env respaldado"
          else
            echo "ADVERTENCIA: no hay .env en ${APP_PATH}; el servicio puede no arrancar."
          fi

          rm -rf "$CLONE_DIR"
          git clone --depth 1 --branch main "$REPO" "$CLONE_DIR"

          rsync -a --delete \
            --exclude node_modules \
            --exclude .env \
            --exclude dist \
            "$CLONE_DIR/telvoice-sms-agent/" "$APP_PATH/"

          if [ -f "$ENV_BACKUP" ]; then
            cp "$ENV_BACKUP" "$APP_PATH/.env"
            rm -f "$ENV_BACKUP"
            echo ".env restaurado"
          fi

          if [ -f "$APP_PATH/.env" ]; then
            set_env_key() {
              _key="$1"
              _val="$2"
              _file="$APP_PATH/.env"
              if grep -q "^${_key}=" "$_file" 2>/dev/null; then
                grep -v "^${_key}=" "$_file" > "${_file}.tmp" && mv "${_file}.tmp" "$_file"
              fi
              printf '%s=%s\n' "$_key" "$_val" >> "$_file"
            }
            set_env_key SMS_PROVIDER_MODE live_test
            set_env_key SMS_LIVE_TEST_ENABLED true
            set_env_key SMS_QUEUE_SCHEDULER_ENABLED true
            set_env_key SMS_QUEUE_SCHEDULER_INTERVAL_SECONDS 60
            set_env_key SMS_QUEUE_SCHEDULER_BATCH_SIZE 15
            set_env_key TELVOICE_VERIFY_NUMBERS '+56974713166:Linea QA 1 telsim:—|+56977109623:Linea QA 2 telsim:—|+56934449937:Linea QA 3 telsim:—'
            set_env_key INTERNAL_QA_COMPANY_ID '6cd1db92-d5c7-45e0-8548-df8907843350'
            if ! grep -q '^PUBLIC_WEBHOOK_BASE_URL=' "$APP_PATH/.env" 2>/dev/null; then
              set_env_key PUBLIC_WEBHOOK_BASE_URL 'https://agent.telvoice.cl'
            fi
            set_env_key GIT_COMMIT_SHA "$DEPLOY_SHA"
          fi

          rm -rf "$CLONE_DIR"

          cd "$APP_PATH"
          npm ci
          npm run typecheck
          echo "=== Limpieza dist (rsync excluye dist; sin rm quedan .js obsoletos) ==="
          rm -rf dist
          npm run build
          npm run migrate:agent-core
          npm run verify:agent-core
          APP_ROOT="$APP_PATH" npm run verify:agent-deploy

          CORE="$APP_PATH/dist/services/agent/agentCore.js"
          test -f "$CORE" || { echo "::error::Falta $CORE"; exit 1; }
          grep -q 'agentPurchaseFlow' "$CORE" || {
            echo "::error::agentCore.js no importa agentPurchaseFlow"
            exit 1
          }
          test -f "$APP_PATH/dist/services/agent/agentPurchaseFlow.js" || {
            echo "::error::Falta agentPurchaseFlow.js"
            exit 1
          }
          grep -q 'formatAgentCampaignAcceptedMessage' \
            "$APP_PATH/dist/services/agent/executePendingAction.js" || {
            echo "::error::executePendingAction.js desactualizado"
            exit 1
          }
          echo "Artefactos agentCore/agentPurchaseFlow verificados"

          if ! grep -q 'label: "SMS Hoy"' dist/views/app-ui/app-pages.js; then
            echo "::error::Build sin etiqueta KPI «SMS Hoy» en dist/views/app-ui/app-pages.js"
            head -n 220 dist/views/app-ui/app-pages.js | tail -n 40 || true
            exit 1
          fi

          pm2 delete telvoice-sms-agent 2>/dev/null || true
          pm2 start ecosystem.config.cjs --update-env
          pm2 save 2>/dev/null || true

          echo "=== PM2 ==="
          pm2 list | head -8

          HEALTH_PORT=3001
          if [ -f "$APP_PATH/.env" ]; then
            env_port=$(grep -E '^PORT=' "$APP_PATH/.env" | tail -1 | cut -d= -f2- | tr -d '"' | tr -d "'" || true)
            if [ -n "$env_port" ]; then HEALTH_PORT="$env_port"; fi
          fi
          HEALTH_URL="http://127.0.0.1:${HEALTH_PORT}/health"
          echo "=== Health local (${HEALTH_URL}) ==="
          echo "Esperando arranque tras pm2 restart..."
          sleep 3

          health_ok=0
          health_body=""
          for attempt in $(seq 1 10); do
            health_body=$(curl -sf --connect-timeout 5 --max-time 15 "$HEALTH_URL" || true)
            if [ -n "$health_body" ]; then
              echo "$health_body"
              echo ""
              echo "Health local OK (intento ${attempt}/10)"
              health_ok=1
              break
            fi
            echo "Health local intento ${attempt}/10 falló; reintento en 3s..."
            sleep 3
          done

          if [ "$health_ok" -ne 1 ]; then
            echo "::error::Health local no respondió tras 10 intentos"
            echo "=== pm2 status ==="
            pm2 status || true
            echo "=== pm2 logs (últimas 80 líneas) ==="
            pm2 logs telvoice-sms-agent --lines 80 --nostream 2>&1 || true
            echo "=== curl -v health local (sin credenciales) ==="
            curl -sv --connect-timeout 5 --max-time 15 "$HEALTH_URL" 2>&1 | head -60 || true
            exit 1
          fi

          if ! echo "$health_body" | grep -q "\"build\":\"${DEPLOY_SHA}\""; then
            echo "::error::Health local sin build SHA esperado (${DEPLOY_SHA})"
            echo "Respuesta: $health_body"
            pm2 describe telvoice-sms-agent 2>&1 | head -30 || true
            exit 1
          fi
          echo "Build local verificado: ${DEPLOY_SHA}"

          test -f dist/index.js && echo "DEPLOY_OK=dist/index.js"
          REMOTE

      - name: Verificar health público
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -e
          echo "=== Health público (https://agent.telvoice.cl/health) ==="
          sleep 3
          for attempt in $(seq 1 10); do
            body=$(curl -sf --connect-timeout 10 --max-time 20 https://agent.telvoice.cl/health || true)
            if [ -n "$body" ]; then
              echo "$body"
              echo ""
              echo "Health público OK (intento ${attempt}/10)"
              if echo "$body" | grep -q "\"build\":\"${DEPLOY_SHA}\""; then
                echo "Build SHA en producción coincide con el commit desplegado."
                exit 0
              fi
              echo "Health público sin build ${DEPLOY_SHA}: $body"
            fi
            echo "Health público intento ${attempt}/10 falló; reintento en 3s..."
            sleep 3
          done
          echo "::error::Health público no coincide con el commit desplegado (${DEPLOY_SHA})"
          curl -sv --connect-timeout 10 --max-time 20 https://agent.telvoice.cl/health 2>&1 | head -40 || true
          exit 1
