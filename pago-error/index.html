<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="No se completó el pago. Tu compra no fue cobrada." />
  <title>Pago no completado | Telvoice.cl</title>
  <link rel="canonical" href="https://www.telvoice.cl/pago-error/" />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="../assets/telvoice-isotipo.png" type="image/png" />
  <meta name="theme-color" content="#0052cc" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/payment-pages.css" />
</head>
<body class="payment-page">
  <header class="payment-header">
    <div class="payment-header-inner">
      <a href="../" class="payment-brand" aria-label="Telvoice.cl, inicio">
        <img src="../assets/telvoice-isotipo.png" alt="Telvoice" width="40" height="40" decoding="async" />
        <span class="payment-brand-text">Telvoice<span class="domain">.cl</span></span>
      </a>
    </div>
  </header>
  <main class="payment-main">
    <div class="payment-card">
      <span class="payment-icon payment-icon--fail material-symbols-outlined" aria-hidden="true">cancel</span>
      <h1 id="payment-return-title" class="payment-title">No se completó el pago</h1>
      <p id="payment-return-text" class="payment-text">Tu compra no fue cobrada. Puedes volver al inicio e intentar nuevamente cuando quieras.</p>
<p class="payment-sub">Si necesitas ayuda, escríbenos a <a href="mailto:ventas@telvoice.net">ventas@telvoice.net</a>.</p>
      <div id="payment-order-summary" class="payment-order-summary" hidden></div>
      <p id="payment-return-meta" class="payment-sub" hidden></p>
      <p id="payment-email-note" class="payment-sub" hidden></p>
      <div class="payment-actions">
        <a class="payment-btn payment-btn--primary" href="../index.html#precios">Reintentar compra</a>
        <a class="payment-btn payment-btn--secondary" href="../">Volver al inicio</a>
      </div>
    </div>
  </main>
  <script src="../js/payment-return.js"></script>
</body>
</html>
