# Nginx — admin.telvoice.cl (superadmin Telvoice SMS Agent)
# Mismo upstream Node que agent.telvoice.cl (:3001)

server {
    listen 80;
    listen [::]:80;
    server_name admin.telvoice.cl;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Tras DNS A admin → 2.24.120.99:
#   sudo ln -sf /etc/nginx/sites-available/admin.telvoice.cl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.telvoice.cl
