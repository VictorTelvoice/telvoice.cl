<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#faf8ff"/>
    </linearGradient>
    <linearGradient id="sim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0052cc" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="360" height="200" fill="url(#bg)"/>
  <circle cx="300" cy="36" r="52" fill="#0052cc" opacity="0.06"/>
  <circle cx="48" cy="168" r="40" fill="#0052cc" opacity="0.05"/>

  <!-- Panel -->
  <g filter="url(#shadow)" transform="translate(24 52)">
    <rect width="88" height="64" rx="10" fill="#fff" stroke="#c3d4f0" stroke-width="1.2"/>
    <rect x="10" y="10" width="36" height="5" rx="2.5" fill="#0052cc" opacity="0.85"/>
    <rect x="10" y="22" width="68" height="4" rx="2" fill="#dbe4f5"/>
    <rect x="10" y="30" width="56" height="4" rx="2" fill="#e8eef8"/>
    <rect x="10" y="38" width="48" height="4" rx="2" fill="#e8eef8"/>
    <rect x="10" y="50" width="32" height="8" rx="4" fill="#0052cc" opacity="0.12"/>
    <text x="44" y="57" text-anchor="middle" fill="#0052cc" font-family="Inter,sans-serif" font-size="7" font-weight="600">Panel</text>
  </g>

  <!-- SIM central -->
  <g filter="url(#shadow)" transform="translate(148 58)">
    <rect x="0" y="0" width="64" height="48" rx="8" fill="#fff" stroke="#0052cc" stroke-width="1.5" opacity="0.95"/>
    <path d="M8 6 H40 L56 18 V42 H8 Z" fill="url(#sim)" stroke="#b45309" stroke-width="0.6"/>
    <rect x="14" y="16" width="18" height="12" rx="1.5" fill="#fcd34d" stroke="#b45309" stroke-width="0.4"/>
    <rect x="36" y="16" width="10" height="8" rx="1" fill="#fcd34d" stroke="#b45309" stroke-width="0.4"/>
    <rect x="36" y="26" width="10" height="8" rx="1" fill="#fcd34d" stroke="#b45309" stroke-width="0.4"/>
    <text x="32" y="58" text-anchor="middle" fill="#0052cc" font-family="Montserrat,sans-serif" font-size="7" font-weight="700">SIM real</text>
  </g>

  <!-- Telegram -->
  <g filter="url(#shadow)" transform="translate(148 8)">
    <circle cx="32" cy="20" r="18" fill="#229ED9"/>
    <path fill="#fff" d="M25 20.2 L37.8 15.1 C38.4 14.8 38.9 15.2 38.7 15.9 L36.9 24.4 C36.7 25.2 36.1 25.4 35.4 25 L31.8 22.5 L29.4 25.4 C29.1 25.7 28.8 25.8 28.5 25.6 L28.7 22.1 L34.1 17.4 C34.4 17.1 34 16.9 33.6 17.2 L27.8 21.2 L24.4 20.2 C23.7 20 23.7 19.5 24.5 19.2 Z"/>
  </g>

  <!-- API -->
  <g filter="url(#shadow)" transform="translate(248 52)">
    <rect width="88" height="64" rx="10" fill="#fff" stroke="#c3d4f0" stroke-width="1.2"/>
    <text x="14" y="28" fill="#0052cc" font-family="ui-monospace,monospace" font-size="11" font-weight="700">&lt;/&gt;</text>
    <rect x="14" y="36" width="60" height="4" rx="2" fill="#dbe4f5"/>
    <rect x="14" y="44" width="44" height="4" rx="2" fill="#e8eef8"/>
    <text x="44" y="57" text-anchor="middle" fill="#0052cc" font-family="Inter,sans-serif" font-size="7" font-weight="600">API</text>
  </g>

  <!-- Conexiones -->
  <path d="M112 84 H148" stroke="#0052cc" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.45"/>
  <path d="M212 84 H248" stroke="#0052cc" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.45"/>
  <path d="M180 58 V50" stroke="#0052cc" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.45"/>

  <!-- Sin teléfono -->
  <g transform="translate(118 138)">
    <rect width="124" height="34" rx="8" fill="#fff" stroke="#c3d4f0" stroke-width="1"/>
    <rect x="28" y="10" width="68" height="14" rx="4" fill="#f2f3ff"/>
    <line x1="36" y1="17" x2="88" y2="17" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 2"/>
    <circle cx="18" cy="17" r="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <path d="M14 17 L16.5 19.5 L22 14" stroke="#dc2626" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <text x="62" y="21" text-anchor="middle" fill="#525f7a" font-family="Inter,sans-serif" font-size="7" font-weight="500">Sin celular físico</text>
  </g>
</svg>
