<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tu pago con Mercado Pago está pendiente de confirmación." />
  <title>Pago pendiente | Telvoice.cl</title>
  <link rel="canonical" href="https://www.telvoice.cl/pago-pendiente/" />

  <script src="../js/telvoice-analytics-bootstrap.js" data-root="../"></script>
  <link rel="icon" href="../assets/telvoice-isotipo.png" type="image/png" />
  <meta name="theme-color" content="#0052cc" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0052cc",
            background: "#faf8ff",
            surface: "#faf8ff",
            "surface-container-low": "#f2f3ff",
            "surface-tint": "#0c56d0",
            "outline-variant": "#c3c6d6",
            "on-background": "#131b2e",
            "on-surface-variant": "#434654",
            "on-primary": "#ffffff"
          },
          spacing: { "container-max": "1440px" },
          fontFamily: {
            h3: ["Montserrat", "sans-serif"],
            "body-md": ["Inter", "sans-serif"]
          },
          fontSize: {
            h3: ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }]
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="../css/payment-pages.css" />
  <link rel="stylesheet" href="../css/telvoice-type-lab.css?v=20260615" />
  <link rel="stylesheet" href="../css/telvoice-public-nav.css?v=20260704" />
  <link rel="stylesheet" href="../css/telvoice-site-footer.css" />
</head>
<body class="payment-page tv-type-lab font-body-md antialiased bg-background text-on-background">
  <div id="telvoice-public-nav" data-root="../"></div>
  <script src="../js/telvoice-public-brand.js"></script>
  <script src="../js/telvoice-public-nav.js?v=20260704"></script>
  <main class="payment-main">
    <div class="payment-card">
      <span class="payment-icon payment-icon--pending material-symbols-outlined" aria-hidden="true">schedule</span>
      <h1 id="payment-return-title" class="payment-title">Pago pendiente</h1>
      <p id="payment-return-text" class="payment-text">Tu pago está siendo procesado. Te notificaremos cuando Mercado Pago confirme el resultado.</p>

      <div id="payment-order-summary" class="payment-order-summary" hidden></div>
      <p id="payment-return-meta" class="payment-sub" hidden></p>
      <p id="payment-email-note" class="payment-sub" hidden></p>
      <div class="payment-actions">
        <a class="payment-btn payment-btn--primary" href="../">Volver al inicio</a>
        
      </div>
    </div>
  </main>
  <div id="telvoice-site-footer" data-root="../"></div>
  <script src="../js/payment-return.js"></script>
  <script src="../js/telvoice-public-floating-agent.js?v=20260704" data-root="../"></script>
  <script src="../js/telvoice-site-footer.js?v=20260704"></script>
</body>
</html>
